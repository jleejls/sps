<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stage Page</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4e2cf;
      font-family: Arial, sans-serif;
      text-align: center;
      color: #333;
    }

    .box {
      max-width: 420px;
      padding: 28px;
      border: 2px solid #8b5a2b;
      border-radius: 16px;
      background: white;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }

    h1 {
      margin-top: 0;
      font-size: 1.6rem;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.5;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #8b5a2b;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #6f451f;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Stage Web Page</h1>
    <p>
      This is a stage web page used for testing.<br>
      It is not available for public use.
    </p>
    <button onclick="closePage()">Close</button>
  </div>

  <script>
    function closePage() {
      window.close();

      setTimeout(function () {
        window.location.href = "about:blank";
      }, 300);
    }
  </script>
</body>
</html>
