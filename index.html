<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stage Page</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3e2cc;
      font-family: Arial, sans-serif;
      color: #2b2b2b;
      text-align: center;
    }
    .box {
      width: min(90vw, 520px);
      padding: 32px;
      border: 2px solid #8a6a46;
      border-radius: 18px;
      background: #fff8ef;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      font-size: 18px;
      line-height: 1.45;
    }
    button {
      margin-top: 22px;
      padding: 14px 28px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #6f4e2f;
      color: white;
      cursor: pointer;
    }
    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <main class="box">
    <h1>Stage Web Page</h1>
    <p>
      This is a stage web page used for testing.
      It is not available for public use.
    </p>
    <button onclick="closePage()">Close</button>
  </main>
  <script>
    function closePage() {
      window.open('', '_self');
      window.close();
      setTimeout(function () {
        document.body.innerHTML =
          '<main class="box"><h1>Closed</h1><p>You may now close this browser tab.</p></main>';
      }, 300);
    }
  </script>
</body>
</html>
