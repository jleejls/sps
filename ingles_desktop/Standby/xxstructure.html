<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InglesYa Desktop Structure</title>

  <style>
    :root {
      --page-bg: #f4f5f7;
      --card-bg: #ffffff;
      --card-border: #cfd6de;

      --frame-size: 140px;
      --gap: 8px;
      --button-size: 50px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--page-bg);
      overflow-x: hidden;
    }

    .page {
      max-width: 900px;
      margin: 6px auto 0 auto;
      padding: 0 8px 10px 8px;
      display: grid;
      grid-template-columns: 74px auto;
      gap: 12px;
      align-items: start;
    }

    /* LEFT CONTROL RAIL */
    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .button-rail {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #d2d2d2;
      border-radius: 12px;
      padding: 7px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      align-items: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    .lesson-badge {
      width: 66px;
      min-height: 66px;
      background: #f3da9c;
      border: 1px solid #d6bc78;
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.25;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6px;
    }

    .nav-button {
      width: var(--button-size);
      height: var(--button-size);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.18);
    }

    .nav-button .icon {
      font-size: 18px;
      line-height: 1;
      margin-bottom: 2px;
    }

    .green { background: #6fa832; }
    .orange { background: #d97818; }
    .gold { background: #d9a21c; }
    .blue { background: #3e78a8; }
    .purple { background: #7c4aa8; }
    .red { background: #b93831; }

    .nav-button:hover {
      filter: brightness(1.08);
    }

    /* 20-FRAME GRID:
       11 objects around the outside, 9 pronouns inside */
    .frame-grid {
      display: grid;
      grid-template-columns: repeat(5, var(--frame-size));
      grid-template-rows: repeat(4, var(--frame-size));
      gap: var(--gap);
      justify-content: center;
      align-items: start;
    }

    .frame {
      width: var(--frame-size);
      height: var(--frame-size);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .frame img {
      width: 96%;
      height: 96%;
      object-fit: contain;
      display: block;
    }

    .placeholder {
      color: #777;
      font-size: 14px;
      text-align: center;
      line-height: 1.35;
    }

    /* Objects down the left side */
    #object-1 { grid-column: 1; grid-row: 1; }
    #object-2 { grid-column: 1; grid-row: 2; }
    #object-3 { grid-column: 1; grid-row: 3; }
    #object-4 { grid-column: 1; grid-row: 4; }

    /* Objects across the bottom */
    #object-5 { grid-column: 2; grid-row: 4; }
    #object-6 { grid-column: 3; grid-row: 4; }
    #object-7 { grid-column: 4; grid-row: 4; }

    /* Objects back up the right side */
    #object-8  { grid-column: 5; grid-row: 4; }
    #object-9  { grid-column: 5; grid-row: 3; }
    #object-10 { grid-column: 5; grid-row: 2; }
    #object-11 { grid-column: 5; grid-row: 1; }

    /* Pronouns in the center */
    #pronoun-1 { grid-column: 2; grid-row: 1; }
    #pronoun-2 { grid-column: 3; grid-row: 1; }
    #pronoun-3 { grid-column: 4; grid-row: 1; }

    #pronoun-4 { grid-column: 2; grid-row: 2; }
    #pronoun-5 { grid-column: 3; grid-row: 2; }
    #pronoun-6 { grid-column: 4; grid-row: 2; }

    #pronoun-7 { grid-column: 2; grid-row: 3; }
    #pronoun-8 { grid-column: 3; grid-row: 3; }
    #pronoun-9 { grid-column: 4; grid-row: 3; }

    @media (max-width: 950px) {
      :root {
        --frame-size: 126px;
        --gap: 7px;
        --button-size: 47px;
      }

      .page {
        max-width: 820px;
        gap: 9px;
      }

      .lesson-badge {
        width: 62px;
        min-height: 62px;
        font-size: 10px;
      }

      .nav-button {
        font-size: 7px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <aside class="left-panel">
      <div class="button-rail">
        <button class="nav-button green" onclick="location.href='lessonselect.html'">
          <span class="icon">☰</span>
          Lessons
        </button>

        <button class="nav-button green">
          <span class="icon">↱</span>
          Prev
        </button>

        <button class="nav-button orange">
          <span class="icon">↻</span>
          Shuffle
        </button>

        <button class="nav-button gold">
          <span class="icon">●</span>
          Teacher
        </button>

        <button class="nav-button blue">
          <span class="icon">✉</span>
          Message
        </button>

        <button class="nav-button purple">
          <span class="icon">▣</span>
          Review
        </button>

        <button class="nav-button red" onclick="location.href='../index.html'">
          <span class="icon">▯</span>
          Back
        </button>
      </div>

      <div class="lesson-badge">lesson<br>1</div>
    </aside>

    <section class="frame-grid">

      <!-- OBJECTS: 1-11 -->
      <div class="frame" id="object-1"><div class="placeholder">object 1</div></div>
      <div class="frame" id="object-2"><div class="placeholder">object 2</div></div>
      <div class="frame" id="object-3"><div class="placeholder">object 3</div></div>
      <div class="frame" id="object-4"><div class="placeholder">object 4</div></div>
      <div class="frame" id="object-5"><div class="placeholder">object 5</div></div>
      <div class="frame" id="object-6"><div class="placeholder">object 6</div></div>
      <div class="frame" id="object-7"><div class="placeholder">object 7</div></div>
      <div class="frame" id="object-8"><div class="placeholder">object 8</div></div>
      <div class="frame" id="object-9"><div class="placeholder">object 9</div></div>
      <div class="frame" id="object-10"><div class="placeholder">object 10</div></div>
      <div class="frame" id="object-11"><div class="placeholder">object 11</div></div>

      <!-- PRONOUNS: 1-9 -->
      <div class="frame" id="pronoun-1"><div class="placeholder">pronoun 1</div></div>
      <div class="frame" id="pronoun-2"><div class="placeholder">pronoun 2</div></div>
      <div class="frame" id="pronoun-3"><div class="placeholder">pronoun 3</div></div>
      <div class="frame" id="pronoun-4"><div class="placeholder">pronoun 4</div></div>
      <div class="frame" id="pronoun-5"><div class="placeholder">pronoun 5</div></div>
      <div class="frame" id="pronoun-6"><div class="placeholder">pronoun 6</div></div>
      <div class="frame" id="pronoun-7"><div class="placeholder">pronoun 7</div></div>
      <div class="frame" id="pronoun-8"><div class="placeholder">pronoun 8</div></div>
      <div class="frame" id="pronoun-9"><div class="placeholder">pronoun 9</div></div>

    </section>

  </main>
</body>
</html>
