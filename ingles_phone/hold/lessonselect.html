<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InglesYa Lesson Select</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #dff7ff 0%, #f8f0d8 100%);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .lesson-page {
    width: 94%;
    max-width: 900px;
    padding: 22px;
    text-align: center;
  }

  .title-card {
    background: rgba(255, 255, 255, 0.78);
    border-radius: 22px;
    padding: 16px 14px;
    margin-bottom: 18px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.16);
  }

  h1 {
    margin: 0 0 8px 0;
    font-size: 2.1rem;
    letter-spacing: 0.5px;
  }

  .subtitle {
    font-size: 1.05rem;
    opacity: 0.85;
  }

  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  .lesson-button {
    border: none;
    border-radius: 20px;
    padding: 19px 10px;
    font-size: 1.18rem;
    font-weight: bold;
    background: rgba(255, 255, 255, 0.92);
    cursor: pointer;
    box-shadow: 0 5px 12px rgba(0,0,0,0.18);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .lesson-button:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 7px 16px rgba(0,0,0,0.22);
  }

  .lesson-button:active {
    transform: scale(0.98);
  }

  .footer-note {
    margin-top: 18px;
    font-size: 0.92rem;
    opacity: 0.72;
  }

  @media (max-width: 700px) {
    body {
      align-items: flex-start;
    }

    .lesson-page {
      width: 96%;
      padding: 14px 10px;
    }

    .title-card {
      padding: 12px 10px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.55rem;
    }

    .subtitle {
      font-size: 0.95rem;
    }

    .lesson-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .lesson-button {
      padding: 14px 8px;
      font-size: 1rem;
      border-radius: 16px;
    }

    .footer-note {
      margin-top: 12px;
      font-size: 0.82rem;
    }
  }

  @media (max-height: 720px) and (max-width: 700px) {
    .lesson-button {
      padding: 11px 8px;
      font-size: 0.96rem;
    }

    h1 {
      font-size: 1.38rem;
    }

    .subtitle {
      display: none;
    }
  }
</style>
</head>

<body>

<div class="lesson-page">
  <div class="title-card">
    <h1>InglesYa</h1>
    <div class="subtitle">Select a lesson</div>
  </div>

  <div class="lesson-grid">
    <button class="lesson-button" onclick="goToLesson(1)">Lesson 1</button>
    <button class="lesson-button" onclick="goToLesson(2)">Lesson 2</button>
    <button class="lesson-button" onclick="goToLesson(3)">Lesson 3</button>
    <button class="lesson-button" onclick="goToLesson(4)">Lesson 4</button>

    <button class="lesson-button" onclick="goToLesson(5)">Lesson 5</button>
    <button class="lesson-button" onclick="goToLesson(6)">Lesson 6</button>
    <button class="lesson-button" onclick="goToLesson(7)">Lesson 7</button>
    <button class="lesson-button" onclick="goToLesson(8)">Lesson 8</button>

    <button class="lesson-button" onclick="goToLesson(9)">Lesson 9</button>
    <button class="lesson-button" onclick="goToLesson(10)">Lesson 10</button>
    <button class="lesson-button" onclick="goToLesson(11)">Lesson 11</button>
    <button class="lesson-button" onclick="goToLesson(12)">Lesson 12</button>

    <button class="lesson-button" onclick="goToLesson(13)">Lesson 13</button>
    <button class="lesson-button" onclick="goToLesson(14)">Lesson 14</button>
    <button class="lesson-button" onclick="goToLesson(15)">Lesson 15</button>
    <button class="lesson-button" onclick="goToLesson(16)">Lesson 16</button>

    <button class="lesson-button" onclick="goToLesson(17)">Lesson 17</button>
    <button class="lesson-button" onclick="goToLesson(18)">Lesson 18</button>
    <button class="lesson-button" onclick="goToLesson(19)">Lesson 19</button>
    <button class="lesson-button" onclick="goToLesson(20)">Lesson 20</button>
  </div>

  <div class="footer-note">Working lesson selector</div>
</div>

<script>
  function goToLesson(lessonNumber) {
    const lesson = String(lessonNumber);
    sessionStorage.setItem("selectedLesson", lesson);
    sessionStorage.setItem("lesson", lesson);
    sessionStorage.setItem("currentLesson", lesson);

    // Safety: if the structure builder was skipped, create the phone slot data here too.
    if (!sessionStorage.getItem("pronounSlots")) {
      const pronounSlots = [];
      for (let i = 1; i <= 9; i++) pronounSlots.push({ id: i, kind: "main" });
      sessionStorage.setItem("pronounSlots", JSON.stringify(pronounSlots));
    }

    if (!sessionStorage.getItem("objectSlots")) {
      const objectSlots = [];
      for (let i = 1; i <= 11; i++) objectSlots.push({ id: i });
      sessionStorage.setItem("objectSlots", JSON.stringify(objectSlots));
    }

    if (!sessionStorage.getItem("expressionPronounIds")) {
      sessionStorage.setItem("expressionPronounIds", JSON.stringify([]));
    }

    if (!sessionStorage.getItem("tense")) {
      sessionStorage.setItem("tense", "now");
    }

    window.location.href = "conductor.html";
  }
</script>

</body>
</html>
