<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InglesYa Phone 3x6 + Expression Circles Mockup</title>
<style>
  * { box-sizing: border-box; }

  :root {
    --page-bg: #f4f5f7;
    --frame-bg: #ffffff;
    --frame-border: #cfd6de;
    --frame-size: 72px;
    --gap: 6px;
    --circle-size: 46px;
    --button-height: 42px;
    --radius: 10px;
  }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--page-bg);
    font-family: Arial, Helvetica, sans-serif;
    color: #222;
  }

  body {
    display: flex;
    justify-content: center;
  }

  .phone-page {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    padding: 6px 6px 58px;
  }

  .lesson-badge {
    width: 170px;
    min-height: 28px;
    margin: 0 auto 6px;
    background: #f3da9c;
    border: 1px solid #d7ba73;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #5a4920;
    font-weight: bold;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, var(--frame-size));
    gap: var(--gap);
    justify-content: center;
  }

  .section {
    margin-bottom: 8px;
  }

  .frame {
    width: var(--frame-size);
    height: var(--frame-size);
    background: var(--frame-bg);
    border: 1px solid var(--frame-border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-size: 12px;
    font-weight: bold;
    color: #666;
  }

  .pronoun {
    background: #fffdf7;
  }

  .object {
    background: #f9fbff;
  }

  .expression-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    margin: 6px auto 8px;
    min-height: 52px;
  }

  .expression-circle {
    width: var(--circle-size);
    height: var(--circle-size);
    border-radius: 50%;
    background: #ffffff;
    border: 2px solid #9a74b8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    color: #5b3972;
    box-shadow: 0 2px 6px rgba(0,0,0,.14);
  }

  .note {
    text-align: center;
    font-size: 11px;
    line-height: 1.2;
    color: #555;
    margin: 3px 0 6px;
  }

  .button-grid {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    max-width: 420px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    background: rgba(245,245,245,.98);
    border-top: 1px solid #d7d7d7;
    padding: 5px;
  }

  .button {
    height: var(--button-height);
    border-radius: 8px;
    border: 1px solid #999;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  @media (max-width: 380px) {
    :root {
      --frame-size: 68px;
      --gap: 5px;
      --circle-size: 43px;
      --button-height: 39px;
    }
    .lesson-badge {
      min-height: 26px;
      margin-bottom: 5px;
      font-size: 12px;
    }
    .section {
      margin-bottom: 7px;
    }
    .expression-row {
      min-height: 48px;
      margin-bottom: 7px;
    }
  }

  @media (max-width: 330px) {
    :root {
      --frame-size: 62px;
      --gap: 4px;
      --circle-size: 40px;
      --button-height: 36px;
    }
    .note {
      display: none;
    }
  }
</style>
</head>
<body>
  <main class="phone-page">
    <div class="lesson-badge">tense-now&nbsp;&nbsp;lesson-1</div>

    <section class="section" aria-label="Pronouns">
      <div class="grid">
        <div class="frame pronoun">P1</div>
        <div class="frame pronoun">P2</div>
        <div class="frame pronoun">P3</div>
        <div class="frame pronoun">P4</div>
        <div class="frame pronoun">P5</div>
        <div class="frame pronoun">P6</div>
        <div class="frame pronoun">P7</div>
        <div class="frame pronoun">P8</div>
        <div class="frame pronoun">P9</div>
      </div>
    </section>

    <div class="expression-row" aria-label="Expression speakers">
      <div class="expression-circle">E1</div>
      <div class="expression-circle">E2</div>
    </div>
    <div class="note">Circular expression speakers play alone. They do not unite with objects.</div>

    <section class="section" aria-label="Objects">
      <div class="grid">
        <div class="frame object">O1</div>
        <div class="frame object">O2</div>
        <div class="frame object">O3</div>
        <div class="frame object">O4</div>
        <div class="frame object">O5</div>
        <div class="frame object">O6</div>
        <div class="frame object">O7</div>
        <div class="frame object">O8</div>
        <div class="frame object">O9</div>
      </div>
    </section>
  </main>

  <nav class="button-grid" aria-label="Program buttons">
    <div class="button">↑</div>
    <div class="button">⤴</div>
    <div class="button">☰</div>
    <div class="button">?</div>
    <div class="button">✉</div>
    <div class="button">$</div>
    <div class="button">↩</div>
    <div class="button">T</div>
  </nav>
</body>
</html>
