<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InglesYa Phone Structure</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f5f7;
    color: #222;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .message {
    width: min(90vw, 360px);
    background: white;
    border: 1px solid #d7dbe3;
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
  }
</style>
</head>
<body>
  <main class="message">
    Preparing the phone lesson layout...
  </main>

<script>
  // PHONE STRUCTURE BUILDER
  // This page prepares the phone layout data, then sends the learner
  // to lessonselect.html.
  //
  // Phone layout intention:
  //   - preserve the same slot IDs and slot order
  //   - preserve the 7 pronoun frames, 10 object frames, and 2 expression frames
  //   - use the compact 3-4-3-4-3 visual row plan
  //   - request approximately 20% larger frames
  //   - request very small row gaps so the four-frame rows can nearly touch
  //
  // conductor.html is not changed by this file. If conductor.html reads the
  // layoutConfig item below, it will receive the new phone layout instructions.
  // If conductor.html has hard-coded frame CSS, that CSS will still control the
  // final size and position.
  window.addEventListener("DOMContentLoaded", function () {
    const pronounSlots = [];
    for (let i = 1; i <= 7; i++) {
      pronounSlots.push({ id: i, kind: "main" });
    }

    const objectSlots = [];
    for (let i = 1; i <= 10; i++) {
      objectSlots.push({ id: i });
    }

    const expressionSlots = [{ id: 8 }, { id: 9 }];

    const phoneLayoutConfig = {
      layoutName: "phone-fixed-3-4-3-4-3-direct",
      frameScale: 1,
      rowGapPx: 2,
      columnGapPx: 2,
      allowFourFrameRowsToNearlyTouch: true,
      preventScrolling: false,
      preserveFrameOrder: true,
      rows: [
        { group: "pronouns", ids: [1, 2, 3] },
        { group: "pronouns", ids: [4, 5, 6, 7] },
        { group: "objects",  ids: [1, 2, 3] },
        { group: "objects",  ids: [4, 5, 6, 7] },
        { group: "objects",  ids: [8, 9, 10] },
        { group: "expressions", ids: [8, 9] }
      ],
      notes: "Increase frame dimensions by 20%; reduce row gap to 2-4px; reposition bottom rows upward as space allows without scrolling."
    };

    sessionStorage.setItem("pronounSlots", JSON.stringify(pronounSlots));
    sessionStorage.setItem("objectSlots", JSON.stringify(objectSlots));
    sessionStorage.setItem("expressionSlots", JSON.stringify(expressionSlots));
    sessionStorage.setItem("expressionPronounIds", JSON.stringify([8, 9]));
    sessionStorage.setItem("phoneLayoutConfig", JSON.stringify(phoneLayoutConfig));

    if (!sessionStorage.getItem("tense")) {
      sessionStorage.setItem("tense", "now");
    }

    const params = new URLSearchParams(window.location.search);
    const shouldAutoStartLevel1 =
      params.get("autoStartLevel1") === "1" ||
      sessionStorage.getItem("autoStartLevel1") === "yes" ||
      sessionStorage.getItem("firstTimeStart") === "yes" ||
      localStorage.getItem("autoStartLevel1") === "yes" ||
      localStorage.getItem("firstTimeStart") === "yes";

    if (shouldAutoStartLevel1) {
      sessionStorage.setItem("lesson", "1");
      sessionStorage.setItem("selectedLesson", "1");
      sessionStorage.setItem("currentLesson", "1");
      localStorage.setItem("lesson", "1");
      localStorage.setItem("selectedLesson", "1");
      localStorage.setItem("currentLesson", "1");

      // Use this instruction once. After conductor opens, normal lesson buttons
      // should behave normally.
      sessionStorage.removeItem("autoStartLevel1");
      sessionStorage.removeItem("firstTimeStart");
      localStorage.removeItem("autoStartLevel1");
      localStorage.removeItem("firstTimeStart");

      window.location.replace("conductor.html?lesson=1&prep=" + Date.now());
      return;
    }

    if (!sessionStorage.getItem("lesson") && !sessionStorage.getItem("selectedLesson")) {
      sessionStorage.setItem("lesson", "1");
      sessionStorage.setItem("selectedLesson", "1");
    }

    window.location.replace("lessonselect.html");
  });
</script>
</body>
</html>
