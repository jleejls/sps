<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InglesYa Phone Structure</title>
<style>
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Arial, Helvetica, sans-serif;
    background:#ffffff;
    color:#222;
  }
  .message{
    width:min(92vw,420px);
    border:1px solid #d0d0d0;
    border-radius:14px;
    padding:18px;
    text-align:center;
    box-shadow:0 4px 14px rgba(0,0,0,.12);
  }
</style>
</head>
<body>
  <div class="message">Preparing the phone structure...</div>

<script>
(function(){
  // This is the only page that defines the phone frame stations.
  // Conductor reads this stationStorage and renders exactly what is stored here.
  const phoneStructure = {
    version: "inglesya-phone-3-4-3-4-3-plus-2-circles-20260624",
    layoutName: "3-4-3-4-3 + 2 circle frames",
    gridColumns: 8,
    rows: [3, 4, 3, 4, 3, 2],
    expressionPronounIds: [8, 9],
    stations: [
      // Row 1: 3 object frames
      { station:"station-01", group:"objects",  id:1, row:1, gridColumn:"2 / span 2", shape:"rectangle" },
      { station:"station-02", group:"objects",  id:2, row:1, gridColumn:"4 / span 2", shape:"rectangle" },
      { station:"station-03", group:"objects",  id:3, row:1, gridColumn:"6 / span 2", shape:"rectangle" },

      // Row 2: 4 object frames
      { station:"station-04", group:"objects",  id:4, row:2, gridColumn:"1 / span 2", shape:"rectangle" },
      { station:"station-05", group:"objects",  id:5, row:2, gridColumn:"3 / span 2", shape:"rectangle" },
      { station:"station-06", group:"objects",  id:6, row:2, gridColumn:"5 / span 2", shape:"rectangle" },
      { station:"station-07", group:"objects",  id:7, row:2, gridColumn:"7 / span 2", shape:"rectangle" },

      // Row 3: 3 main pronoun frames
      { station:"station-08", group:"pronouns", id:1, row:3, gridColumn:"2 / span 2", shape:"rectangle", kind:"main" },
      { station:"station-09", group:"pronouns", id:2, row:3, gridColumn:"4 / span 2", shape:"rectangle", kind:"main" },
      { station:"station-10", group:"pronouns", id:3, row:3, gridColumn:"6 / span 2", shape:"rectangle", kind:"main" },

      // Row 4: 4 main pronoun frames
      { station:"station-11", group:"pronouns", id:4, row:4, gridColumn:"1 / span 2", shape:"rectangle", kind:"main" },
      { station:"station-12", group:"pronouns", id:5, row:4, gridColumn:"3 / span 2", shape:"rectangle", kind:"main" },
      { station:"station-13", group:"pronouns", id:6, row:4, gridColumn:"5 / span 2", shape:"rectangle", kind:"main" },
      { station:"station-14", group:"pronouns", id:7, row:4, gridColumn:"7 / span 2", shape:"rectangle", kind:"main" },

      // Row 5: 3 object frames
      { station:"station-15", group:"objects",  id:8,  row:5, gridColumn:"2 / span 2", shape:"rectangle" },
      { station:"station-16", group:"objects",  id:9,  row:5, gridColumn:"4 / span 2", shape:"rectangle" },
      { station:"station-17", group:"objects",  id:10, row:5, gridColumn:"6 / span 2", shape:"rectangle" },

      // Row 6: 2 conversation circle frames
      { station:"station-18", group:"pronouns", id:8, row:6, gridColumn:"3 / span 2", shape:"circle", kind:"expression" },
      { station:"station-19", group:"pronouns", id:9, row:6, gridColumn:"5 / span 2", shape:"circle", kind:"expression" }
    ]
  };

  sessionStorage.setItem("stationStorage", JSON.stringify(phoneStructure));
  sessionStorage.setItem("inglesyaStructureReady", "true");
  sessionStorage.setItem("expressionPronounIds", JSON.stringify(phoneStructure.expressionPronounIds));

  const params = new URLSearchParams(window.location.search);
  const shouldAutoStartLevel1 =
    params.get("autoStartLevel1") === "1" ||
    sessionStorage.getItem("autoStartLevel1") === "yes" ||
    sessionStorage.getItem("firstTimeStart") === "yes" ||
    localStorage.getItem("autoStartLevel1") === "yes" ||
    localStorage.getItem("firstTimeStart") === "yes";

  if (shouldAutoStartLevel1) {
    sessionStorage.setItem("lesson", "1");
    sessionStorage.setItem("selectedLesson", "1");
    sessionStorage.setItem("currentLesson", "1");
    localStorage.setItem("lesson", "1");
    localStorage.setItem("selectedLesson", "1");
    localStorage.setItem("currentLesson", "1");
    sessionStorage.removeItem("autoStartLevel1");
    sessionStorage.removeItem("firstTimeStart");
    localStorage.removeItem("autoStartLevel1");
    localStorage.removeItem("firstTimeStart");
    window.location.replace("conductor.html?lesson=1&prep=" + Date.now());
    return;
  }

  window.location.replace("lessonselect.html");
})();
</script>
</body>
</html>
