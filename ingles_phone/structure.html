<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InglesYa Phone Structure</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f5f7;
    color: #222;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .message {
    width: min(90vw, 360px);
    background: white;
    border: 1px solid #d7dbe3;
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
  }
</style>
</head>
<body>
  <main class="message">
    Preparing the phone lesson layout...
  </main>

<script>
  // PHONE STRUCTURE BUILDER
  // This page prepares the phone layout data, then sends the learner
  // to lessonselect.html.
  window.addEventListener("DOMContentLoaded", function () {
    const pronounSlots = [];
    for (let i = 1; i <= 7; i++) {
      pronounSlots.push({ id: i, kind: "main" });
    }

    const objectSlots = [];
    for (let i = 1; i <= 10; i++) {
      objectSlots.push({ id: i });
    }

    const expressionSlots = [{ id: 8 }, { id: 9 }];

    sessionStorage.setItem("pronounSlots", JSON.stringify(pronounSlots));
    sessionStorage.setItem("objectSlots", JSON.stringify(objectSlots));
    sessionStorage.setItem("expressionSlots", JSON.stringify(expressionSlots));
    sessionStorage.setItem("expressionPronounIds", JSON.stringify([8, 9]));

    if (!sessionStorage.getItem("tense")) {
      sessionStorage.setItem("tense", "now");
    }

    if (!sessionStorage.getItem("lesson") && !sessionStorage.getItem("selectedLesson")) {
      sessionStorage.setItem("lesson", "1");
      sessionStorage.setItem("selectedLesson", "1");
    }

    window.location.replace("lessonselect.html");
  });
</script>
</body>
</html>
