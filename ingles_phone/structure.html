<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InglesYa Phone Structure</title>
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; min-height:100%; font-family:Arial, Helvetica, sans-serif; background:#f4f5f7; color:#222; }
  body{ display:flex; align-items:center; justify-content:center; }
  .message{ width:min(90vw,360px); background:white; border:1px solid #d7dbe3; border-radius:14px; padding:18px; text-align:center; box-shadow:0 4px 16px rgba(0,0,0,.12); }
</style>
</head>
<body>
<main class="message">Preparing the phone lesson...</main>
<script>
window.addEventListener("DOMContentLoaded", function(){
  // Hard-reset version: no layout instructions are passed. conductor.html owns the phone layout.
  sessionStorage.removeItem("phoneLayoutConfig");
  sessionStorage.removeItem("pronounSlots");
  sessionStorage.removeItem("objectSlots");
  sessionStorage.removeItem("expressionSlots");
  sessionStorage.removeItem("expressionPronounIds");

  const params = new URLSearchParams(window.location.search);
  const auto = params.get("autoStartLevel1") === "1" ||
    sessionStorage.getItem("autoStartLevel1") === "yes" ||
    sessionStorage.getItem("firstTimeStart") === "yes" ||
    localStorage.getItem("autoStartLevel1") === "yes" ||
    localStorage.getItem("firstTimeStart") === "yes";

  if (auto) {
    sessionStorage.setItem("lesson", "1");
    sessionStorage.setItem("selectedLesson", "1");
    sessionStorage.setItem("currentLesson", "1");
    localStorage.setItem("lesson", "1");
    localStorage.setItem("selectedLesson", "1");
    localStorage.setItem("currentLesson", "1");
    sessionStorage.removeItem("autoStartLevel1");
    sessionStorage.removeItem("firstTimeStart");
    localStorage.removeItem("autoStartLevel1");
    localStorage.removeItem("firstTimeStart");
    window.location.replace("conductor.html?lesson=1&v=" + Date.now());
    return;
  }

  window.location.replace("lessonselect.html?v=" + Date.now());
});
</script>
</body>
</html>
