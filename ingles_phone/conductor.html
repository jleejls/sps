<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SPS Phone Conductor Hard Reset</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<style>
  *{ box-sizing:border-box; }

  :root{
    /* Four across must fit. On most phones this lands around 82–92px. */
    --frame-size:clamp(72px, 23.5vw, 94px);
    --gap:2px;
    --button-height:39px;
  }

  html, body{
    margin:0;
    width:100%;
    min-height:100%;
    background:#ffffff;
    font-family:Arial, Helvetica, sans-serif;
    color:#222;
    overflow-x:hidden;
  }

  body{ padding-bottom:58px; }

  header, h3{ display:none; }

  main{
    width:100%;
    max-width:420px;
    margin:0 auto;
    padding:4px 4px 2px;
  }

  .lesson-number-badge{
    position:fixed;
    top:6px;
    left:6px;
    z-index:70;
    width:24px;
    height:24px;
    border:1px solid #d7dbe3;
    border-radius:50%;
    background:rgba(255,255,255,.90);
    color:#333;
    font:700 15px/24px Arial, Helvetica, sans-serif;
    text-align:center;
    pointer-events:none;
  }

  .phone-layout-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:var(--gap);
    margin:0 0 var(--gap) 0;
  }

  .phone-layout-row.object-start-row{ margin-top:8px; }

  .tile{
    position:relative;
    width:var(--frame-size);
    height:var(--frame-size);
    border:1px solid #d7dbe3;
    border-radius:8px;
    background:#f9fafb;
    overflow:hidden;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    touch-action:manipulation;
    user-select:none;
  }

  .pronoun-tile{ background:#fffdf7; }
  .object-tile{ background:#f9fbff; }

  .tile img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    pointer-events:none;
  }

  .object-tile img{ transform:scale(1.10); }

  .expression-circle{
    width:var(--frame-size);
    height:var(--frame-size);
    border-radius:50%;
    border:2px solid #9a74b8;
    background:#ffffff;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,.14);
    touch-action:manipulation;
  }

  .expression-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    pointer-events:none;
  }

  .tile.selected{
    outline:4px solid #c00000;
    outline-offset:-4px;
  }

  .expression-circle.speaking{
    outline:4px solid #c00000;
    outline-offset:2px;
  }

  .label{
    font:9px/1.15 monospace;
    color:#777;
    text-align:center;
    padding:3px;
    white-space:pre-line;
  }

  .zipbutton{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    z-index:80;
    display:grid;
    grid-template-columns:repeat(8, 1fr);
    gap:4px;
    background:#f0f0f0;
    border-top:1px solid #ddd;
    padding:5px;
    max-width:420px;
    margin:0 auto;
  }

  .buttonz{
    min-height:var(--button-height);
    border:2px solid #4CAF50;
    border-radius:9px;
    background:#d05000;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    touch-action:manipulation;
  }

  .buttonz img{
    max-width:100%;
    max-height:34px;
    display:block;
    pointer-events:none;
  }

  .contact-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:200;
    padding:20px;
  }

  .contact-overlay[hidden]{ display:none; }

  .contact-box{
    background:white;
    color:black;
    padding:22px;
    border-radius:12px;
    max-width:430px;
    text-align:center;
    font-family:Arial, sans-serif;
    box-shadow:0 8px 25px rgba(0,0,0,.25);
  }

  .contact-box button{
    display:inline-block;
    margin:6px;
    padding:9px 13px;
    border-radius:8px;
    border:1px solid #777;
    background:#f4f4f4;
    color:#111;
    font:14px Arial, sans-serif;
    cursor:pointer;
  }

  .contact-address{ font-weight:bold; margin:10px 0 14px; }

  @media (max-height:700px){
    :root{ --frame-size:clamp(66px, 22.8vw, 88px); }
    .phone-layout-row.object-start-row{ margin-top:4px; }
  }
</style>
</head>

<body>
<div id="lessonNumberBadge" class="lesson-number-badge"></div>
<header id="banner">Phone Conductor</header>

<main>
  <div id="phoneLayoutMount" class="phone-layout"></div>
</main>

<div id="pbar" class="zipbutton" aria-label="Program buttons">
  <div class="buttonz" data-btn="continue" title="Continuar / next lesson"><img src="../trigger/adelante.png" alt="Adelante"></div>
  <div class="buttonz" data-btn="exit" title="Exit"><img src="../trigger/exit.png" alt="Exit"></div>
  <div class="buttonz" data-btn="choosel" title="Choose lesson"><img src="../trigger/choosel.png" alt="Choose lesson"></div>
  <div class="buttonz" data-btn="help" title="Help / guidelines"><img src="../trigger/help.png" alt="Help"></div>
  <div class="buttonz" data-btn="donate" title="Donate"><img src="../trigger/donate.png" alt="Donate"></div>
  <div class="buttonz" data-btn="email" title="Contact Jimmy Lucky"><img src="../trigger/email.png" alt="Email"></div>
  <div class="buttonz" data-btn="lagente" title="La Gente"><img src="../trigger/lagente.png" alt="La Gente"></div>
  <div class="buttonz" data-btn="translate" title="Translation"><img src="../trigger/translate.png" alt="Translate"></div>
</div>

<div id="contactOverlay" class="contact-overlay" hidden>
  <div class="contact-box">
    <h2>Email Contact</h2>
    <p>Please send your message to:</p>
    <p class="contact-address">spanishsoundbites@gmail.com</p>
    <button type="button" onclick="closeContactOverlay()">Close</button>
  </div>
</div>

<audio id="player" preload="none"></audio>

<script>
(function(){
  // HARD RESET PHONE CONDUCTOR
  // This file does not depend on phoneLayoutConfig from structure.html.
  // It always builds one known-good 3-4-3-4-3-2 layout.

  const urlLesson = new URLSearchParams(window.location.search).get("lesson");
  const storedLesson = urlLesson ||
    sessionStorage.getItem("lesson") ||
    sessionStorage.getItem("selectedLesson") ||
    sessionStorage.getItem("currentLesson") ||
    localStorage.getItem("lesson") ||
    localStorage.getItem("selectedLesson") ||
    localStorage.getItem("currentLesson") ||
    "1";

  let lesson = Number(storedLesson);
  if (!Number.isFinite(lesson) || lesson < 1) lesson = 1;
  lesson = Math.min(20, Math.floor(lesson));

  sessionStorage.setItem("lesson", String(lesson));
  sessionStorage.setItem("selectedLesson", String(lesson));
  sessionStorage.setItem("currentLesson", String(lesson));
  localStorage.setItem("lesson", String(lesson));
  localStorage.setItem("selectedLesson", String(lesson));
  localStorage.setItem("currentLesson", String(lesson));

  document.getElementById("lessonNumberBadge").textContent = String(lesson);
  document.getElementById("banner").textContent = "Phone — Lesson " + lesson;

  const basePath = `../group/lesson${lesson}`;
  const rows = [
    { group:"pronouns", ids:[1,2,3] },
    { group:"pronouns", ids:[4,5,6,7] },
    { group:"objects",  ids:[1,2,3] },
    { group:"objects",  ids:[4,5,6,7] },
    { group:"objects",  ids:[8,9,10] },
    { group:"expressions", ids:[8,9] }
  ];

  // Keep this short. Long fallback chains were slowing the phone badly.
  const pronImg = i => [`${basePath}/pronouns/images/p${i}.jpg`, `${basePath}/image/p${i + 10}.jpg`, `${basePath}/image/p${i}.jpg`];
  const objImg  = i => [`${basePath}/objects/images/p${i}.jpg`, `${basePath}/image/p${i}.jpg`, `${basePath}/image/p${i + 10}.jpg`];
  const pronAud = i => [`${basePath}/pronouns/audios/a${i}.m4a`, `${basePath}/sound/${i + 10}.m4a`, `${basePath}/sound/${i}.m4a`];
  const objAud  = i => [`${basePath}/objects/audios/a${i}.m4a`, `${basePath}/sound/${i}.m4a`];

  function makeTile(srcList, fallbackLabel, extraClass){
    const sources = Array.isArray(srcList) ? srcList : [srcList];
    let srcIndex = 0;

    const d = document.createElement("div");
    d.className = extraClass;

    const img = document.createElement("img");
    img.alt = fallbackLabel;
    img.onerror = () => {
      srcIndex += 1;
      if (srcIndex < sources.length) img.src = sources[srcIndex];
      else d.innerHTML = `<div class="label">missing:\n${fallbackLabel}</div>`;
    };
    img.src = sources[srcIndex];
    d.appendChild(img);
    return d;
  }

  function buildTile(group, id){
    let tile;
    if (group === "pronouns") {
      tile = makeTile(pronImg(id), `p${id}.jpg`, "tile pronoun-tile");
      tile.dataset.group = "pronouns";
      tile.dataset.index = String(id);
      tile.dataset.kind = "main";
      return tile;
    }
    if (group === "objects") {
      tile = makeTile(objImg(id), `object p${id}.jpg`, "tile object-tile");
      tile.dataset.group = "objects";
      tile.dataset.index = String(id);
      return tile;
    }
    if (group === "expressions") {
      tile = makeTile(pronImg(id), `expression p${id}.jpg`, "expression-circle");
      tile.dataset.group = "expressions";
      tile.dataset.index = String(id);
      return tile;
    }
  }

  const mount = document.getElementById("phoneLayoutMount");
  let previousGroup = "";
  rows.forEach(rowSpec => {
    const row = document.createElement("div");
    row.className = "phone-layout-row";
    row.dataset.group = rowSpec.group;
    if (rowSpec.group === "objects" && previousGroup !== "objects") row.classList.add("object-start-row");
    rowSpec.ids.forEach(id => row.appendChild(buildTile(rowSpec.group, id)));
    mount.appendChild(row);
    previousGroup = rowSpec.group;
  });

  const player = document.getElementById("player");
  let lastPronSrc = null;
  let selectedPronTile = null;
  let playToken = 0;

  function clearSelection(){
    if (selectedPronTile) selectedPronTile.classList.remove("selected");
    selectedPronTile = null;
  }

  function selectTile(tile){
    clearSelection();
    selectedPronTile = tile;
    tile.classList.add("selected");
  }

  function playSequence(sequence){
    playToken++;
    const myToken = playToken;
    let sequenceIndex = 0;
    try { player.pause(); } catch(e) {}
    player.onerror = null;
    player.onended = null;

    function playChoices(choices){
      let choiceIndex = 0;
      function tryNextChoice(){
        if (myToken !== playToken) return;
        if (choiceIndex >= choices.length) { nextInSequence(); return; }
        player.onerror = tryNextChoice;
        player.src = choices[choiceIndex++];
        player.currentTime = 0;
        player.play().catch(() => tryNextChoice());
      }
      tryNextChoice();
    }

    function nextInSequence(){
      if (myToken !== playToken) return;
      if (sequenceIndex >= sequence.length) return;
      playChoices(sequence[sequenceIndex++]);
    }

    player.onended = nextInSequence;
    nextInSequence();
  }

  function playExpression(index){
    clearSelection();
    // Simple expression audio fallback. Conversation can be added back after layout is stable.
    playSequence([pronAud(index)]);
  }

  document.addEventListener("click", ev => {
    const el = ev.target.closest && ev.target.closest("[data-group][data-index]");
    if (!el) return;

    const group = el.dataset.group;
    const index = Number(el.dataset.index);

    if (group === "expressions") {
      lastPronSrc = null;
      playExpression(index);
      return;
    }

    if (group === "pronouns") {
      lastPronSrc = pronAud(index);
      selectTile(el);
      playSequence([lastPronSrc]);
      return;
    }

    if (group === "objects") {
      const objectSrc = objAud(index);
      if (lastPronSrc) {
        playSequence([lastPronSrc, objectSrc]);
        lastPronSrc = null;
        clearSelection();
      } else {
        playSequence([objectSrc]);
      }
    }
  });

  const pbar = document.getElementById("pbar");
  function currentLesson(){ return Number(sessionStorage.getItem("lesson") || "1") || 1; }
  function goTo(page){ window.location.href = page; }

  const actions = {
    continue(){
      const nextLesson = currentLesson() + 1;
      if (nextLesson > 20) { alert("You are already on the last lesson."); return; }
      sessionStorage.setItem("lesson", String(nextLesson));
      sessionStorage.setItem("selectedLesson", String(nextLesson));
      sessionStorage.setItem("currentLesson", String(nextLesson));
      localStorage.setItem("lesson", String(nextLesson));
      localStorage.setItem("selectedLesson", String(nextLesson));
      localStorage.setItem("currentLesson", String(nextLesson));
      window.location.href = "conductor.html?lesson=" + encodeURIComponent(nextLesson) + "&v=" + Date.now();
    },
    exit(){ goTo("../quit.html"); },
    choosel(){ goTo("lessonselect.html"); },
    help(){ goTo("../guide/guidelines.html"); },
    donate(){ goTo("donate.html"); },
    email(){ openContactOverlay(); },
    lagente(){
      const l = currentLesson();
      sessionStorage.setItem("lagenteReturnHref", window.location.href);
      localStorage.setItem("lagenteReturnHref", window.location.href);
      localStorage.setItem("inglesyaLane", "phone");
      localStorage.setItem("platicaLane", "phone");
      goTo("../lagente.html?return=phone&lesson=" + encodeURIComponent(l));
    },
    translate(){ playSequence([[`../group/lesson${currentLesson()}/translation/a1.m4a`]]); }
  };

  pbar.addEventListener("click", ev => {
    const button = ev.target.closest && ev.target.closest(".buttonz[data-btn]");
    if (!button) return;
    ev.preventDefault();
    ev.stopPropagation();
    const action = actions[button.dataset.btn];
    if (action) action();
  });
})();

function openContactOverlay(){
  const overlay = document.getElementById("contactOverlay");
  if (overlay) overlay.hidden = false;
}
function closeContactOverlay(){
  const overlay = document.getElementById("contactOverlay");
  if (overlay) overlay.hidden = true;
}
</script>
</body>
</html>
