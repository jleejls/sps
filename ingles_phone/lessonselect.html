<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InglesYa Lesson Select</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#dff7ff 0%,#f8f0d8 100%);
    display:flex;
    justify-content:center;
    align-items:flex-start;
  }
  .lesson-page{ width:96%; max-width:900px; padding:14px 10px; text-align:center; }
  .title-card{ background:rgba(255,255,255,.78); border-radius:22px; padding:12px 10px; margin-bottom:12px; box-shadow:0 5px 15px rgba(0,0,0,.16); }
  h1{ margin:0 0 8px 0; font-size:1.55rem; letter-spacing:.5px; }
  .subtitle{ font-size:.95rem; opacity:.85; }
  .lesson-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .lesson-button{ border:none; border-radius:16px; padding:14px 8px; font-size:1rem; font-weight:bold; background:rgba(255,255,255,.92); cursor:pointer; box-shadow:0 5px 12px rgba(0,0,0,.18); }
  .footer-note{ margin-top:12px; font-size:.82rem; opacity:.72; }
</style>
</head>
<body>
<div class="lesson-page">
  <div class="title-card"><h1>InglesYa</h1><div class="subtitle">Select a lesson</div></div>
  <div class="lesson-grid" id="lessonGrid"></div>
  <div class="footer-note">Phone hard-reset lesson selector</div>
</div>
<script>
  const grid = document.getElementById("lessonGrid");
  for (let i = 1; i <= 20; i++) {
    const b = document.createElement("button");
    b.className = "lesson-button";
    b.textContent = "Lesson " + i;
    b.onclick = () => goToLesson(i);
    grid.appendChild(b);
  }

  function goToLesson(lessonNumber){
    const lesson = String(lessonNumber);
    sessionStorage.setItem("selectedLesson", lesson);
    sessionStorage.setItem("lesson", lesson);
    sessionStorage.setItem("currentLesson", lesson);
    localStorage.setItem("selectedLesson", lesson);
    localStorage.setItem("lesson", lesson);
    localStorage.setItem("currentLesson", lesson);

    // Remove older experimental layout instructions so conductor cannot inherit stale storage.
    sessionStorage.removeItem("phoneLayoutConfig");
    sessionStorage.removeItem("pronounSlots");
    sessionStorage.removeItem("objectSlots");
    sessionStorage.removeItem("expressionSlots");
    sessionStorage.removeItem("expressionPronounIds");

    window.location.href = "conductor.html?lesson=" + encodeURIComponent(lesson) + "&v=" + Date.now();
  }
</script>
</body>
</html>
